<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>已存資料查看</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; margin: 10px 0; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 12px; color: white; margin-bottom: 5px; }
        .tag-weather { background: #ff9500; }
        .tag-github { background: #333; }
        .source-label { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <h1>資料庫已存筆數</h1>
    <a href="/">回首頁</a>
    <hr>
    {% for row in data %}
    <div class="card">
        <div class="tag {% if row[1] == 'GitHub' %}tag-github{% else %}tag-weather{% endif %}">{{ row[1] }}</div>
        <h3>{{ row[2] }}</h3>
        <p>{{ row[3] }}</p>
        <div class="source-label">資料來源: {{ row[1] }} | 抓取時間: {{ row[4] }}</div>
    </div>
    {% endfor %}
</body>
</html>
